# ── www → non-www redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name www.synk.su;
    return 301 https://synk.su$request_uri;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name synk.su api.synk.su;
    return 301 https://$host$request_uri;
}

# ── Frontend ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name synk.su;

    ssl_certificate     /etc/letsencrypt/live/synk.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/synk.su/privkey.pem;

    # Never return 304 — always send fresh headers (prevents stale CSP on soft refresh)
    etag off;
    if_modified_since off;
    add_header Cache-Control "no-store" always;

    # Security headers
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(self), microphone=(self), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.synk.su wss://api.synk.su https://b1d1b7e2-3f2d-42ac-896f-7f964439ffa3.selstorage.ru; media-src 'self' blob: https:; worker-src 'self'; frame-ancestors 'none';" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Backend API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.synk.su;

    ssl_certificate     /etc/letsencrypt/live/synk.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/synk.su/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    client_max_body_size 25M;

    # WebSocket — must come before the generic proxy
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # All other backend routes
    location / {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
