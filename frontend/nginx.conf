# ── www → non-www redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name www.synk.su;
    return 301 https://synk.su$request_uri;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name synk.su api.synk.su;
    return 301 https://$host$request_uri;
}

# ── Frontend ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name synk.su;

    ssl_certificate     /etc/letsencrypt/live/synk.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/synk.su/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Backend API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.synk.su;

    ssl_certificate     /etc/letsencrypt/live/synk.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/synk.su/privkey.pem;

    client_max_body_size 25M;

    # WebSocket — must come before the generic proxy
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # All other backend routes
    location / {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
