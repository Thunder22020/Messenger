#file: noinspection SpringBootApplicationYaml
spring:
  servlet:
    multipart:
      max-file-size: 40MB
      max-request-size: 40MB
  application:
    name: Messenger
  datasource:
    url: jdbc:postgresql://localhost:5432/messenger_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format-sql: false
        transaction:
          jta:
            platform: org.hibernate.service.jta.JtaService
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
app:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY}
    private-key: ${VAPID_PRIVATE_KEY}
    subject: ${VAPID_SUBJECT}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret-key: ${JWT_SECRET}
    access-expiration: 300000
    refresh-expiration: 7
  turn:
    secret: ${TURN_SECRET}
    url: ${TURN_URL:synk.su}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health
  endpoint:
    health:
      show-details: never
  metrics:
    distribution:
      percentiles:
        http.server.requests: [0.5, 0.95, 0.99]

s3:
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  region: ${S3_REGION}
  endpoint: ${S3_ENDPOINT}
  bucket: ${S3_BUCKET}
  fetch-url: ${S3_FETCH_URL}