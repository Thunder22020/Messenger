services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: messenger_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128m
    networks:
      - internal

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      # Database — override localhost with docker service name
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messenger_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis — override localhost with docker service name
      SPRING_DATA_REDIS_HOST: redis
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # JPA — use 'update' on first deploy to create tables, then switch to 'validate'
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      # CORS
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      # TURN
      TURN_SECRET: ${TURN_SECRET}
      TURN_URL: ${TURN_URL:-synk.su}
      # S3
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_FETCH_URL: ${S3_FETCH_URL}
      # VAPID
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}

    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
